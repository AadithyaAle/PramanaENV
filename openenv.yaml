spec_version: 1
name: "SST_hackathon_env"
type: space
runtime: fastapi
app: server.app:app
port: 8000

tasks:
  - name: "task_1_age"
    description: "Fill missing Age with 25 and cast to integer."
    grader:
      type: "function"
      function: "server.graders:grade_task_1_age"

  - name: "task_2_salary"
    description: "Drop rows where Salary is missing."
    grader:
      type: "function"
      function: "server.graders:grade_task_2_salary"

  - name: "task_3_price"
    description: "Convert Price column to integer type."
    grader:
      type: "function"
      function: "server.graders:grade_task_3_price"